    <script>
      (function () {
        try {
          if (localStorage.getItem("theme") === "light")
            document.documentElement.classList.remove("dark");
          else document.documentElement.classList.add("dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
